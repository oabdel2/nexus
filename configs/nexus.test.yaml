server:
  port: 18080
  read_timeout: 30s
  write_timeout: 120s

providers:
  - name: ollama
    type: ollama
    base_url: http://localhost:11434/v1
    enabled: true
    priority: 1
    models:
      - name: qwen2.5:1.5b
        tier: cheap
        cost_per_1k_tokens: 0.0
        max_tokens: 4096
      - name: qwen2.5:1.5b
        tier: mid
        cost_per_1k_tokens: 0.0
        max_tokens: 4096
      - name: qwen2.5:1.5b
        tier: premium
        cost_per_1k_tokens: 0.0
        max_tokens: 4096

  # Fake provider to test circuit breaker failover
  - name: fake-down
    type: openai
    base_url: http://localhost:19999/v1
    enabled: true
    priority: 2
    models:
      - name: fake-model
        tier: economy
        cost_per_1k_tokens: 0.001
        max_tokens: 1024

router:
  threshold: 0.5
  default_tier: mid
  budget_enabled: true
  default_budget: 1.0
  complexity_weights:
    prompt_complexity: 0.30
    context_length: 0.15
    agent_role: 0.20
    step_position: 0.15
    budget_pressure: 0.20

cache:
  enabled: true
  l1_enabled: true
  l2_enabled: false
  ttl: 5m
  max_entries: 1000
  similarity_min: 0.90
  l1:
    enabled: true
    ttl: 5m
    max_entries: 1000
  l2_bm25:
    enabled: true
    ttl: 10m
    max_entries: 5000
    threshold: 10.0
  l2_semantic:
    enabled: true
    ttl: 10m
    max_entries: 5000
    threshold: 0.65
    backend: "ollama"
    model: "bge-m3"
    endpoint: "http://localhost:11434"
    reranker:
      enabled: false
  feedback:
    enabled: true
    max_size: 1000
  shadow:
    enabled: false
  synonym:
    data_dir: "./data/test"
    promotion_threshold: 2

workflow:
  ttl: 30m
  max_steps: 50

telemetry:
  metrics_enabled: true
  metrics_port: 19090
  log_level: debug
  log_format: text

tracing:
  enabled: true
  service_name: "nexus-e2e-test"
  sample_rate: 1.0
  log_spans: true
  export_url: ""

security:
  tls:
    enabled: false
  prompt_guard:
    enabled: true
    mode: "block"
    max_prompt_length: 16000
  oidc:
    enabled: false
  rbac:
    enabled: false
  rate_limit:
    enabled: true
    default_rpm: 120
    burst_size: 20
  cors:
    allowed_origins: ["*"]
  audit_log: true
  body_size_limit: 524288  # 512KB for testing
  request_timeout: "60s"
  panic_recovery: true
  ip_allowlist:
    enabled: false
  input_validation: true
  request_logging: true

billing:
  enabled: false

notification:
  enabled: false

storage:
  vector_backend: "memory"
  kv_backend: "memory"

compression:
  enabled: true
  whitespace: true
  code_strip: true
  history_truncate: true
  max_history_turns: 10
  preserve_last_n: 3

cascade:
  enabled: false
  confidence_threshold: 0.78
  max_latency_ms: 3000
  sample_rate: 1.0

eval:
  enabled: true
  data_dir: "./data/test/eval"
  hedging_penalty: 0.15
  sample_rate: 1.0

events:
  enabled: true
  webhook_urls: []
  webhook_secret: ""

plugins:
  enabled: true
