name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Download dependencies
        run: go mod download
      - name: Build
        run: go build ./...
      - name: Run tests
        run: go test ./... -v -race
      - name: Run benchmarks
        run: go test ./benchmarks/... -bench=. -benchmem -count=1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run gosec
        run: gosec -fmt=json -out=gosec-results.json ./... || true
      - name: Upload gosec results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gosec-results
          path: gosec-results.json
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  docker:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.sha }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  container-scan:
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image for scanning
        run: docker build -t nexus-gateway:scan .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'nexus-gateway:scan'
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true

  integration-test:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build binary
        run: go build -o nexus-test ./cmd/nexus/
      - name: Start server with test config
        run: |
          ./nexus-test --config configs/nexus.yaml &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          sleep 5
      - name: Test /health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/health)
          echo "GET /health -> $STATUS"
          [ "$STATUS" = "200" ] || exit 1
          curl -s http://localhost:8080/health | python3 -m json.tool
      - name: Test /health/live endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/health/live)
          echo "GET /health/live -> $STATUS"
          [ "$STATUS" = "200" ] || exit 1
          BODY=$(curl -s http://localhost:8080/health/live)
          echo "$BODY" | python3 -m json.tool
          echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', f'expected ok, got {d[\"status\"]}'"
      - name: Test /health/ready endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/health/ready)
          echo "GET /health/ready -> $STATUS"
          BODY=$(curl -s http://localhost:8080/health/ready)
          echo "$BODY" | python3 -m json.tool
          echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'checks' in d, 'missing checks field'"
      - name: Stop server
        if: always()
        run: kill $SERVER_PID || true
